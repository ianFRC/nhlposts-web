name: NHL Data Sync

on:
  schedule:
    # 9 AM UTC = ~4–5 AM ET, after overnight games finish
    - cron: '0 9 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run sync job
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SYNC_SEASONS: ${{ vars.SYNC_SEASONS || '20242025,20252026' }}
        run: python sync/sync_job.py

      - name: Ping backend to update sync status
        if: success()
        env:
          RENDER_BACKEND_URL: ${{ secrets.RENDER_BACKEND_URL }}
          SYNC_SECRET: ${{ secrets.SYNC_SECRET }}
        run: |
          if [ -n "$RENDER_BACKEND_URL" ]; then
            curl -s -X POST "${RENDER_BACKEND_URL}/api/sync" \
              -H "x-sync-secret: ${SYNC_SECRET}" \
              -H "Content-Type: application/json" \
              --max-time 30 || echo "Backend ping failed (non-fatal)"
          fi

      - name: Keep Render backend warm
        if: always()
        env:
          RENDER_BACKEND_URL: ${{ secrets.RENDER_BACKEND_URL }}
        run: |
          if [ -n "$RENDER_BACKEND_URL" ]; then
            curl -s "${RENDER_BACKEND_URL}/" --max-time 30 || echo "Warmup ping failed"
          fi
