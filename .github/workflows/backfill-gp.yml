name: Backfill GP Data

on:
  workflow_dispatch:
    inputs:
      dates:
        description: 'Dates to backfill (space-separated YYYY-MM-DD). Leave blank for yesterday.'
        required: false
        default: ''

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run GP backfill
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          ARGS=""
          for d in ${{ inputs.dates }}; do
            ARGS="$ARGS --date $d"
          done
          python sync/backfill_gp.py $ARGS
