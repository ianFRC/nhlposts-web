name: Keep Backend Alive

on:
  schedule:
    # Ping every 10 minutes to prevent Render free tier from sleeping
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Ping backend
        env:
          RENDER_BACKEND_URL: ${{ secrets.RENDER_BACKEND_URL }}
        run: |
          if [ -n "$RENDER_BACKEND_URL" ]; then
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${RENDER_BACKEND_URL}/" --max-time 20)
            echo "Response: $STATUS"
          else
            echo "RENDER_BACKEND_URL not set — skipping"
          fi
